version: 2

sources:
  - name: reference
    catalog: healthcare
    schema: seeds


    tables:
      - name: cms_footnotes
        description: >
          Reference seed containing CMS footnote codes and definitions used
          throughout hospital quality datasets.

      - name: fips_lookup
        description: > 
          Reference seed mapping counties and states to official county FIPS codes. 

      - name: healthcare_acronyms
        description: >
          Reference seed containing healthcare acronym definitions.

      - name: readmission_measures 
        description: >
          Reference seed documenting readmission measure identifiers and categories.

      - name: county_name_overrides
        description: Reference seed manually created to correct county name mismatches between the CMS and FIPS datasets.


models:
  - name: stg_reference__cms_footnotes
    description: >
      Cleaned reference model containing CMS footnote definitions used
      for interpreting hospital reporting values.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments: 
            combination_of_columns:
              - footnote_code
              - footnote_category
    columns:
      - name: footnote_code
        description: >
          Footnote identifier appearing in CMS datasets.
        tests:
          - not_null

      - name: footnote_category
        description: >
          Grouping category assigned to the footnote.

      - name: footnote_text
        description: >
          Original CMS footnote text.

      - name: footnote_definition
        description: >
          Expanded interpretation of the footnote meaning.


  - name: stg_reference__fips_lookup
    description: >
      Standardized county-level FIPS reference lookup used for healthcare
      geographic enrichment and county-based joins. Cleans and normalizes
      county and state identifiers from raw reference data for consistent
      matching against CMS hospital records.
    columns:
      - name: county_fips_code
        description: >
          Five-digit county FIPS code uniquely identifying a county.
        tests:
          - unique
          - not_null

      - name: county_name
        description: >
          County name standardized for joining.
        tests:
          - not_null

      - name: county_join_key
        description: >
          Normalized county join key generated from the FIPS county name.
          Used for matching county-level FIPS reference data to hospital
          county/parish records.
        tests:
          - not_null

      - name: state_abbreviation
        description: >
          USPS two-letter state abbreviation.
        tests:
          - not_null

      - name: state_name
        description: >
          Full state name.
        tests:
          - not_null

      - name: state_fips_code
        description: >
          Two-digit state FIPS code.
        tests:
          - not_null


  - name: stg_reference__healthcare_acronyms
    description: >
      Standardized healthcare acronym lookup reference.
    columns:
      - name: acronym
        description: >
          Healthcare abbreviation or acronym.
        tests:
          - unique
          - not_null

      - name: meaning
        description: >
          Expanded healthcare term.
        tests:
          - not_null


  - name: stg_reference__readmission_measures
    description: >
      Reference model containing readmission measure identifiers and
      descriptive metadata.
    columns:
      - name: measure_id
        description: >
          CMS identifier associated with the readmission measure.
        tests:
          - unique
          - not_null

      - name: measure_name
        description: >
          Human-readable name of the readmission measure.
        tests:
          - not_null

      - name: condition_group
        description: >
          Medical condition or procedure associated with the measure.
        tests:
          - not_null

      - name: measure_category
        description: >
          Category describing the measurement domain.
        tests:
          - not_null

      - name: measure_description
        description: >
          Expanded explanation of the measure.
        tests:
          - not_null


  - name: stg_reference__county_name_overrides
    description: >
      Cleaned county-name override reference model used to resolve known
      county-name mismatches between CMS hospital data and county FIPS
      reference data before geographic enrichment.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments: 
            combination_of_columns:
              - state_abbreviation
              - source_county_join_key
    columns:
      - name: state_abbreviation
        description: >
          Two-letter USPS state or territory abbreviation for the county-name
          override.
        tests:
          - not_null

      - name: source_county_name
        description: >
          County name as it appears in the CMS hospital source data.
        tests:
          - not_null

      - name: standardized_county_name
        description: >
          County name standardized to match the FIPS lookup reference table.
        tests:
          - not_null

      - name: source_county_join_key
        description: >
          Normalized join key generated from the CMS source county name.
        tests:
          - not_null

      - name: standardized_county_join_key
        description: >
          Normalized join key generated from the standardized county name used
          to join against the FIPS lookup table.
        tests:
          - not_null
        